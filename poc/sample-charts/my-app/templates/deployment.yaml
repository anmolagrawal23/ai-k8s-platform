apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    chart: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      chart: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        chart: {{ .Chart.Name }}
        # intentional violations: missing required labels 'app' and 'env'
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
          # intentional violations:
          #   - no resources.limits (cpu, memory)
          #   - no securityContext (runAsNonRoot, allowPrivilegeEscalation)
