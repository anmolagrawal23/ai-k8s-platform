apiVersion: batch/v1
kind: Job
metadata:
  name: sample-batch-job
spec:
  template:
    metadata:
      labels:
        task: data-processing
        app: sample-batch-job
        env: dev
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36.1
          command: ["sh", "-c", "echo 'Processing data...' && sleep 5"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
